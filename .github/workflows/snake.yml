# Nome da GitHub Action
name: Generate Snake Animation

# Gatilhos: quando a Action deve rodar
on:
  # Roda automaticamente a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  
  # Permite que você rode a Action manualmente pela aba "Actions"
  workflow_dispatch:

# Tarefas que a Action irá executar
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Faz o checkout do código do seu repositório
      - uses: actions/checkout@v3

      # 2. Gera a animação da cobrinha
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          # O seu nome de usuário do GitHub
          github_user_name: ${{ github.repository_owner }}
          
          # Define os arquivos de saída
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      # 3. Envia os arquivos gerados para a branch 'output'
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
